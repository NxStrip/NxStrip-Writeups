<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Intelligence Report | NxStrip</title>
    <meta name="description" content="Detailed security analysis and exploit documentation by NxStrip.">
    
    <meta property="og:type" content="article">
    <meta property="og:title" content="NxStrip | Security Writeup">
    <meta property="og:description" content="Technical documentation for vulnerability research and CTF challenges.">
    <meta property="og:image" content="https://nxstrip.vercel.app/assets/Banner.png">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:image" content="https://nxstrip.vercel.app/assets/Banner.png">

    <meta name="google-site-verification" content="1mSbR5uK103kIENG4MTsjqUqDj8OhXG8KhCVlVGKae4" />

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
    <nav>
        <div class="container">
            <a href="index.html" class="logo">Nx<span>Strip</span></a>
            <a href="writeups.html" class="btn-more">← Back</a>
        </div>
    </nav>

    <main class="container section-padding">
        <div id="content" class="markdown-body">
            <p style="color: #00ff00; font-family: 'Courier New', monospace;">Initializing secure connection to database...</p>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
const fileName = urlParams.get('file');
const contentDiv = document.getElementById('content');

if (fileName) {
    fetch(`writeups/${fileName}`)
        .then(response => {
            if (!response.ok) throw new Error("NODE_UNREACHABLE");
            return response.text();
        })
        .then(text => {
            contentDiv.innerHTML = marked.parse(text);
            const cleanName = fileName.replace('.md', '').replace(/-/g, ' ').toUpperCase();
            document.title = `${cleanName} | NxStrip Intelligence`;
            hljs.highlightAll(); 
        })
        .catch(err => {
            renderError("NODE_UNREACHABLE");
        });
} else {
    renderError("NO_FILE_SPECIFIED");
}

function renderError(code) {
    contentDiv.innerHTML = `
        <div style="text-align: center; padding: 40px 10px; font-family: 'Courier New', monospace;">
            <h1 style="font-size: clamp(3rem, 15vw, 5rem); color: #ff0000; text-shadow: 0 0 10px #ff0000; margin: 0;">404</h1>
            
            <div style="display: inline-block; max-width: 100%; overflow: hidden;">
                <p id="error-status" style="color: #00ff00; font-size: clamp(0.9rem, 4vw, 1.2rem); margin: 15px 0; border-right: 2px solid #00ff00; white-space: nowrap; overflow: hidden; width: 26ch; animation: typing 2s steps(26), blink .5s step-end infinite;">
                    STATUS: ${code}...
                </p>
            </div>

            <p style="color: #888; font-size: 0.9rem; margin-bottom: 30px; line-height: 1.4;">
                The requested writeup is either redacted, moved, or does not exist in the current database.
            </p>
            
            <a href="writeups.html" style="background: #00ff00; color: #0a0a0a; padding: 12px 24px; text-decoration: none; font-weight: bold; border-radius: 2px; text-transform: uppercase; display: inline-block;">
                > RETURN_TO_HOME
            </a>
        </div>
        <style>
            @keyframes typing { from { width: 0 } }
            @keyframes blink { 50% { border-color: transparent } }
            
            /* Remove typing animation on very small screens to prevent layout break */
            @media (max-width: 400px) {
                #error-status { 
                    white-space: normal !important; 
                    width: auto !important; 
                    border-right: none !important; 
                    animation: none !important; 
                }
            }
        </style>
    `;
}
    </script>
</body>
</html>
