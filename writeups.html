<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Writeups | NxStrip</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        .filters { margin-bottom: 2rem; display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; }
        .filter-dropdown {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            outline: none;
        }
        .filter-dropdown:focus { border-color: var(--accent); }
        .reset-btn {
            background: transparent; color: var(--text-dim); border: none; cursor: pointer;
            font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;
        }
        .reset-btn:hover { color: var(--accent); }
    </style>
</head>
<body>

    <nav>
        <div class="container">
            <a href="index.html" class="logo">Nx<span>Strip</span></a>
            <div class="nav-right">
                <ul>
                    <li><a href="/about">About</a></li>
                    <li><a href="writeups.html" class="highlight">Writeups</a></li>
                </ul>
                <button id="theme-toggle" aria-label="Toggle Theme">
                    <span class="icon">🌙</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="container section-padding">
        <h1>All Writeups</h1>
        
        <div class="filters">
            <select id="platform-filter" class="filter-dropdown">
                <option value="all">🎯 Select Platform...</option>
                <option value="HTB">HackTheBox (HTB)</option>
                <option value="THM">TryHackMe (THM)</option>
                <option value="ROOT-ME">ROOT-ME</option>
                <option value="PortSwigger">PortSwigger</option>
            </select>

            <select id="ctf-filter" class="filter-dropdown">
                <option value="all">🚩 Select CTF Event...</option>
                <option value="cybergame">cybergame</option>
                <option value="CSCG">CSCG</option>
                <option value="BKCTF">BKCTF</option>
            </select>

            <button id="reset-btn" class="reset-btn">[ Reset Filters ]</button>
        </div>

        <div id="all-writeups-grid" class="grid"></div>
    </main>

    <script src="db.js"></script>
    <script src="script.js"></script>
</body>
</html>
