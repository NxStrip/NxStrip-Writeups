<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>NxStrip | Writeups</title>
    <meta name="description" content="A comprehensive archive of cybersecurity walkthroughs, CTF solutions, and vulnerability research by NxStrip.">
    <meta name="keywords" content="HTB Writeups, THM Walkthroughs, CTF Solutions, Red Team, NxStrip">
    <meta name="author" content="NxStrip">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://nxstrip-writeups.vercel.app/writeups.html">
    <meta property="og:title" content="NxStrip | Writeups Gallery">
    <meta property="og:description" content="Explore the full database of security research and machine walkthroughs.">
    <meta property="og:image" content="https://nxstrip-writeups.vercel.app/assets/Banner.png">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="NxStrip | Writeups Gallery">
    <meta property="twitter:image" content="https://nxstrip-writeups.vercel.app/assets/Banner.png">

    <meta name="google-site-verification" content="1mSbR5uK103kIENG4MTsjqUqDj8OhXG8KhCVlVGKae4" />

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
    
    <script defer src="/_vercel/insights/script.js"></script>

    <style>
        .filters { margin-bottom: 2rem; display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; }
        .filter-dropdown {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            outline: none;
        }
        .filter-dropdown:focus { border-color: var(--accent); }
        .reset-btn {
            background: transparent; color: var(--text-dim); border: none; cursor: pointer;
            font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;
        }
        .reset-btn:hover { color: var(--accent); }
    </style>
</head>
<body>

    <nav>
        <div class="container">
            <a href="index.html" class="logo">Nx<span>Strip</span></a>
            <div class="nav-right">
                <ul>
                    <li><a href="https://nxstrip.vercel.app/">About</a></li>
                    <li><a href="writeups.html" class="highlight">Writeups</a></li>
                </ul>
                <button id="theme-toggle" aria-label="Toggle Theme">
                    <span class="icon">🌙</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="container section-padding">
        <h1>All Writeups</h1>
        
        <div class="filters">
            <select id="platform-filter" class="filter-dropdown">
                <option value="all">🎯 Select Platform...</option>
                <option value="HTB">HackTheBox (HTB)</option>
                <option value="THM">TryHackMe (THM)</option>
                <option value="ROOT-ME">ROOT-ME</option>
                <option value="PortSwigger">PortSwigger</option>
            </select>

            <select id="ctf-filter" class="filter-dropdown">
                <option value="all">🚩 Select CTF Event...</option>
                <option value="cybergame">cybergame</option>
                <option value="CSCG">CSCG</option>
                <option value="BKCTF">BKCTF</option>
            </select>

            <button id="reset-btn" class="reset-btn">[ Reset Filters ]</button>
        </div>

        <div id="all-writeups-grid" class="grid"></div>
    </main>

    <script src="db.js"></script>
    <script src="script.js"></script>
</body>
</html>
